name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: types, lint, unit tests. Fails the build on any lint warning
  # (the repo's zero-warning policy) or coverage/type regression.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Lint (zero warnings)
        run: npm run lint
      - name: Unit + integration tests
        run: npm test

  # Slower gate: build the extension and drive a real capture in Chromium.
  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Render icons
        run: npm run build:icons
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E (Playwright)
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
